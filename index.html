<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Davetlisiniz</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
    color:white;
    background: url("background.jpg") center center no-repeat fixed;
    background-size: contain;
    background-color: #2b0000;
    min-height:100vh;
    position:relative;
}

/* KARARTMA */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

/* AÇILIŞ EKRANI */

#intro{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center, #4b000c 0%, #240005 45%, #090000 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    transition:1.2s ease;
    overflow:hidden;
}

#intro.hide{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
}

.intro-title{
    font-family:'Cinzel',serif;
    font-size:2.4rem;
    color:#d4af37;
    text-align:center;
    margin-bottom:26px;
    letter-spacing:2px;
    animation:fadeIn 1.6s ease;
    text-shadow:0 0 18px rgba(212,175,55,.35);
}

.envelope-wrap{
    position:relative;
    width:min(82vw, 720px);
    animation:envelopeEnter 1.4s ease both, softFloat 4s ease-in-out infinite 1.4s;
}

.envelope-img{
    width:100%;
    display:block;
    filter:drop-shadow(0 25px 45px rgba(0,0,0,.65));
    user-select:none;
    pointer-events:none;
}

.seal-button{
    position:absolute;
    left:50%;
    top:57%;
    transform:translate(-50%,-50%);
    width:clamp(86px, 12vw, 135px);
    height:clamp(86px, 12vw, 135px);
    border-radius:50%;
    border:none;
    background:rgba(212,175,55,0.02);
    cursor:pointer;
    z-index:3;
    transition:.35s ease;
}

.seal-button::before{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;
    border:1px solid rgba(245,208,111,.7);
    box-shadow:
        0 0 22px rgba(212,175,55,.8),
        inset 0 0 18px rgba(212,175,55,.35);
    animation:sealPulse 1.8s ease-in-out infinite;
}

.seal-button:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.seal-hint{
    margin-top:24px;
    font-size:.88rem;
    color:#f1d27a;
    letter-spacing:4px;
    text-transform:uppercase;
    animation:fadeIn 2.2s ease;
}

#intro.opening .envelope-wrap{
    animation:sealOpen .9s ease forwards;
}

#intro.opening .seal-button{
    opacity:0;
    transform:translate(-50%,-50%) scale(.2) rotate(35deg);
}

/* ANA İÇERİK */

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    opacity:0;
    visibility:hidden;
    transform:translateY(25px);
    transition:opacity 1.4s ease, transform 1.4s ease, visibility 1.4s ease;
}

.container.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.container.show .card{
    animation:fadeUp 1.5s ease;
}

.card{

    width:100%;
    max-width:700px;

    padding:60px 30px;

    text-align:center;



}

.top-text{
    letter-spacing:5px;
    font-size:.9rem;
    margin-bottom:20px;
    color:#eee;
}

h1{
    font-family:'Cinzel',serif;
    font-size:3rem;
    color:#d4af37;
    margin-bottom:20px;
    text-shadow:0 0 16px rgba(0,0,0,.65);
}

h3{
    font-family:'Cinzel',serif;
    font-size:2rem;
    color:#d4af37;
    margin-bottom:20px;
    text-shadow:0 0 16px rgba(0,0,0,.65);
}

.date{
    margin:30px 0;
    padding:15px;
    border-top:1px solid rgba(255,255,255,.2);
    border-bottom:1px solid rgba(255,255,255,.2);

    font-size:1.1rem;
    letter-spacing:3px;
}

/* COUNTDOWN */

#countdown{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin:40px 0;
}

.time-box{
    width:100px;
    height:100px;

    border-radius:20px;

    background:rgba(255,255,255,0.07);

    backdrop-filter:blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    border:1px solid rgba(255,255,255,.15);

    transition:.3s;
}

.time-box:hover{
    transform:translateY(-5px);
}

.time-box span{
    font-size:2rem;
    font-weight:700;
    color:#d4af37;
}

.location{
    margin-top:20px;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:35px;

    padding:14px 32px;

    border-radius:40px;

    text-decoration:none;

    background:linear-gradient(45deg,#d4af37,#f1d27a);

    color:#111;

    font-weight:600;

    transition:.4s;
}

.btn:hover{
    transform:scale(1.06);
    box-shadow:0 0 25px rgba(212,175,55,.7);
}

/* ANİMASYONLAR */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes envelopeEnter{
    from{
        opacity:0;
        transform:translateY(45px) scale(.94);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes softFloat{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes sealPulse{
    0%,100%{
        opacity:.65;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(1.12);
    }
}

@keyframes sealOpen{
    0%{
        transform:scale(1);
        opacity:1;
        filter:blur(0);
    }
    45%{
        transform:scale(1.06);
        opacity:1;
        filter:blur(0);
    }
    100%{
        transform:scale(1.22) rotateX(8deg);
        opacity:0;
        filter:blur(8px);
    }
}

/* MOBİL */

@media(max-width:768px){

    h1{
        font-size:2.8rem;
    }

    .intro-title{
        font-size:1.55rem;
        padding:0 20px;
        margin-bottom:22px;
    }

    .envelope-wrap{
        width:94vw;
    }

    .seal-button{
        top:58%;
        width:82px;
        height:82px;
    }

    .seal-hint{
        font-size:.72rem;
        letter-spacing:3px;
        padding:0 18px;
    }

    .card{
        padding:45px 20px;
    }

    .time-box{
        width:85px;
        height:85px;
    }

}

</style>
</head>

<body>

<!-- AÇILIŞ -->

<div id="intro">

    <div class="intro-title">
        Nişanımıza Davetlisiniz
    </div>

    <div class="envelope-wrap">
        <img src="envelope.png" alt="Mühürlü Davetiye Zarfı" class="envelope-img">

        <button class="seal-button" onclick="openInvite()" aria-label="Davetiyeyi aç"></button>
    </div>

    <div class="seal-hint">
        Mühüre dokunun
    </div>

</div>

<!-- ANA İÇERİK -->

<div class="container">

    <div class="card">

        <div class="top-text">
            BİRLİKTELİĞİMİZİ KUTLAMAYA <br> DAVETLİSİNİZ
        </div>

        <h3>
            A. Aleyna & Z. Mert
        </h3>

        <div class="date">
            20 HAZİRAN 2026 <br> SAAT 19:00
        </div>

        <div id="countdown">

            <div class="time-box">
                <span id="days">0</span>
                <small>Gün</small>
            </div>

            <div class="time-box">
                <span id="hours">0</span>
                <small>Saat</small>
            </div>

            <div class="time-box">
                <span id="minutes">0</span>
                <small>Dakika</small>
            </div>

        </div>

        <div class="location">
            <strong>Mekan:</strong><br>
            Deniz Kır Düğün Bahçesi<br>
            Meram / KONYA
        </div>

		<a 
			href="https://maps.app.goo.gl/tDhgkbudi43ZDUJj9"
			target="_blank"
			rel="noopener noreferrer"
			class="btn"
		>
		Yol Tarifi Al
		</a>

    </div>

</div>

<script>

/* AÇILIŞ */

function openInvite(){

    const intro = document.getElementById("intro");

    intro.classList.add("opening");

    setTimeout(function(){
        intro.classList.add("hide");
        document.querySelector(".container").classList.add("show");
    }, 850);

}

/* COUNTDOWN */

const eventDate = new Date("June 20, 2026 19:00:00").getTime();

const updateCountdown = setInterval(function(){

    const now = new Date().getTime();

    const distance = eventDate - now;

    const d = Math.floor(distance / (1000 * 60 * 60 * 24));

    const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

    const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

    document.getElementById("days").innerHTML = d;

    document.getElementById("hours").innerHTML = h;

    document.getElementById("minutes").innerHTML = m;

    if(distance < 0){

        clearInterval(updateCountdown);

        document.getElementById("countdown").innerHTML = "GÜN GELDİ!";

    }

},1000);

</script>

</body>
</html>
